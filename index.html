<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon IA Textuelle</title>
    <!-- Ajout de Marked.js pour convertir le Markdown en HTML -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        /* === VARIABLES & RESET (Fournis) === */
        :root {
            --bg-color: #050505;
            --text-main: #f5f5f7;
            --text-muted: #a1a1a6;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-highlight: rgba(255, 255, 255, 0.15);
            --accent: #0071e3;
            --accent-glow: rgba(0, 113, 227, 0.5);
            --success: #32d74b;
            --danger: #ff453a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            overflow-x: hidden;
            line-height: 1.6;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* === LIQUID BACKGROUND (Fournis) === */
        .bg-blobs {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: -1;
            overflow: hidden;
            background: #000;
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.6;
            animation: float 20s infinite alternate cubic-bezier(0.4, 0, 0.2, 1);
        }

        .blob-1 { top: -10%; left: -10%; width: 50vw; height: 50vw; background: #2e0066; animation-delay: 0s; }
        .blob-2 { bottom: -20%; right: -10%; width: 60vw; height: 60vw; background: #001e4d; animation-delay: -5s; }
        .blob-3 { top: 40%; left: 30%; width: 40vw; height: 40vw; background: #0a2a43; animation-delay: -10s; }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(10%, 15%) scale(1.1); }
            100% { transform: translate(-5%, -10%) scale(0.9); }
        }

        /* === CHAT LAYOUT & GLASSMORPHISM === */
        .app-container {
            max-width: 1000px;
            margin: 0 auto;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 20px;
            gap: 20px;
        }

        .glass-panel {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-radius: 24px;
        }

        /* Header */
        header {
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .header-title { display: flex; align-items: center; gap: 12px; }
        .header-logo {
            width: 36px; height: 36px;
            background: var(--accent);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 1.1rem;
            box-shadow: 0 0 15px var(--accent-glow);
        }
        .header-text h1 { font-size: 1.2rem; font-weight: 600; }
        .header-text p { font-size: 0.8rem; color: var(--text-muted); }

        /* Chat Window */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        /* Scrollbar custom pour le thème sombre */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--glass-highlight); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.3); }

        /* Messages */
        .message-wrapper {
            display: flex;
            gap: 16px;
            align-items: flex-start;
        }
        .message-wrapper.user { flex-direction: row-reverse; }
        
        .avatar {
            width: 36px; height: 36px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            background: var(--glass-highlight);
            border: 1px solid var(--glass-border);
            flex-shrink: 0;
            margin-top: 4px;
        }
        .message-wrapper.user .avatar { background: var(--accent); border-color: var(--accent); }
        
        .message-bubble {
            padding: 16px 20px;
            border-radius: 20px;
            max-width: 80%;
            line-height: 1.6;
            font-size: 0.95rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .message-wrapper.user .message-bubble {
            background: var(--accent);
            color: white;
            border-top-right-radius: 4px;
        }
        .message-wrapper.ai .message-bubble {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-top-left-radius: 4px;
            color: var(--text-main);
        }

        /* Markdown Styles pour les réponses de l'IA */
        .message-bubble p { margin-bottom: 12px; }
        .message-bubble p:last-child { margin-bottom: 0; }
        .message-bubble code {
            background: rgba(255, 255, 255, 0.1);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 0.9em;
            color: #e2e8f0;
        }
        .message-bubble pre {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--glass-border);
            padding: 16px;
            border-radius: 12px;
            overflow-x: auto;
            margin: 12px 0;
        }
        .message-bubble pre code { background: transparent; padding: 0; color: #a1a1a6; }
        .message-bubble ul, .message-bubble ol { margin-left: 24px; margin-bottom: 12px; }
        .message-bubble strong { color: white; font-weight: 600; }

        /* Input Area */
        .input-area {
            padding: 12px 16px;
            display: flex;
            align-items: flex-end;
            gap: 12px;
        }
        
        .input-area textarea {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-main);
            padding: 8px 4px;
            resize: none;
            max-height: 150px;
            outline: none;
            font-size: 1rem;
            line-height: 1.5;
        }
        .input-area textarea::placeholder { color: var(--text-muted); }
        
        .input-area button {
            background: var(--accent);
            color: white;
            border: none;
            width: 44px; height: 44px;
            border-radius: 50%;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.3s ease;
            flex-shrink: 0;
            margin-bottom: 2px;
        }
        .input-area button:hover:not(:disabled) {
            box-shadow: 0 0 20px var(--accent-glow);
            transform: translateY(-2px);
        }
        .input-area button:disabled {
            background: var(--glass-highlight);
            color: var(--text-muted);
            cursor: not-allowed;
            box-shadow: none;
        }

        /* Animations */
        .typing-indicator span {
            display: inline-block;
            width: 6px; height: 6px;
            background-color: var(--text-muted);
            border-radius: 50%;
            margin: 0 2px;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        /* Curseur pour l'effet d'écriture */
        .cursor {
            display: inline-block;
            width: 6px;
            height: 1em;
            background-color: var(--text-main);
            margin-left: 2px;
            vertical-align: middle;
            animation: blink 1s step-end infinite;
        }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>

    <!-- Liquid Background -->
    <div class="bg-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="app-container">
        <!-- Header -->
        <header class="glass-panel">
            <div class="header-title">
                <div class="header-logo">IA</div>
                <div class="header-text">
                    <h1>Assistant Textuel</h1>
                    <p>Propulsé par Gemini</p>
                </div>
            </div>
        </header>

        <!-- Chat Container -->
        <main id="chat-container" class="glass-panel chat-container">
            
            <!-- Welcome Message -->
            <div class="message-wrapper ai">
                <div class="avatar">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 14 4-4"/><path d="M3.34 19a10 10 0 1 1 17.32 0"/></svg>
                </div>
                <div class="message-bubble">
                    <p>Bonjour ! Je suis prêt à vous aider. Posez-moi vos questions dans cette interface !</p>
                </div>
            </div>

        </main>

        <!-- Input Area -->
        <form id="chat-form" class="glass-panel input-area">
            <textarea 
                id="user-input" 
                rows="1"
                placeholder="Envoyer un message à l'IA..."
                required
            ></textarea>
            <button type="submit" id="send-button" disabled>
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg>
            </button>
        </form>
    </div>

    <script>
        const apiKey = "AQ.Ab8RN6ILHJ6Lo1Fe50rk8fMeizhdyEDfRYJ532viBgEhvr2DwA"; // API Key provided by execution environment
        const chatContainer = document.getElementById('chat-container');
        const chatForm = document.getElementById('chat-form');
        const userInput = document.getElementById('user-input');
        const sendButton = document.getElementById('send-button');

        let conversationHistory = []; 

        // Auto-resize textarea
        userInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 150) + 'px';
            sendButton.disabled = this.value.trim() === '';
        });

        // Enter key to submit, Shift+Enter for new line
        userInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                if (userInput.value.trim() !== '') {
                    chatForm.dispatchEvent(new Event('submit', { cancelable: true, bubbles: true }));
                }
            }
        });

        function scrollToBottom() {
            chatContainer.scrollTo({
                top: chatContainer.scrollHeight,
                behavior: 'smooth'
            });
        }

        // Add message container
        function createMessageElement(isUser = false) {
            const wrapper = document.createElement('div');
            wrapper.className = `message-wrapper ${isUser ? 'user' : 'ai'}`;
            
            const avatar = document.createElement('div');
            avatar.className = 'avatar';
            avatar.innerHTML = isUser 
                ? `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>`
                : `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 14 4-4"/><path d="M3.34 19a10 10 0 1 1 17.32 0"/></svg>`;

            const bubble = document.createElement('div');
            bubble.className = 'message-bubble';

            wrapper.appendChild(avatar);
            wrapper.appendChild(bubble);
            chatContainer.appendChild(wrapper);
            scrollToBottom();

            return bubble;
        }

        // Add loading indicator
        function addLoadingIndicator() {
            const bubble = createMessageElement(false);
            bubble.parentElement.id = 'loading-indicator';
            bubble.innerHTML = `<div class="typing-indicator"><span></span><span></span><span></span></div>`;
            return bubble;
        }

        function removeLoadingIndicator() {
            const indicator = document.getElementById('loading-indicator');
            if (indicator) indicator.remove();
        }

        // Call Gemini API
        async function fetchGeminiResponse(userText) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            
            conversationHistory.push({ role: "user", parts: [{ text: userText }] });

            const payload = {
                contents: conversationHistory,
                systemInstruction: {
                    parts: [{ text: "Tu es un assistant IA utile, poli et concis. Réponds toujours en français." }]
                }
            };

            const maxRetries = 5;
            let retryDelay = 1000;

            for (let i = 0; i < maxRetries; i++) {
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);

                    const data = await response.json();
                    if (data.candidates && data.candidates.length > 0) {
                        const aiText = data.candidates[0].content.parts[0].text;
                        conversationHistory.push({ role: "model", parts: [{ text: aiText }] });
                        return aiText;
                    } else {
                        throw new Error("No response generated.");
                    }
                } catch (error) {
                    if (i === maxRetries - 1) return "Désolé, une erreur est survenue.";
                    await new Promise(resolve => setTimeout(resolve, retryDelay));
                    retryDelay *= 2; 
                }
            }
        }

        // Handle form submission
        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const text = userInput.value.trim();
            if (!text) return;

            // 1. Show user message
            userInput.value = '';
            userInput.style.height = 'auto';
            sendButton.disabled = true;
            
            const userBubble = createMessageElement(true);
            userBubble.textContent = text; // Plain text for user

            // 2. Show loading
            addLoadingIndicator();

            // 3. Fetch API
            const aiResponseText = await fetchGeminiResponse(text);

            // 4. Remove loading
            removeLoadingIndicator();

            // 5. Typewriter effect + Markdown compilation
            const aiBubble = createMessageElement(false);
            
            let charIndex = 0;
            const typingSpeed = 10; // Vitesse d'apparition (en ms)
            
            function typeWriter() {
                if (charIndex <= aiResponseText.length) {
                    // Prendre le texte partiel
                    const partialText = aiResponseText.substring(0, charIndex);
                    
                    // Le convertir en HTML avec Marked
                    let htmlContent = marked.parse(partialText);
                    
                    // Astuce pour garder le curseur clignotant à la fin du texte sans casser le HTML (listes, paragraphes)
                    if (htmlContent.endsWith('</p>\n')) {
                        htmlContent = htmlContent.slice(0, -5) + '<span class="cursor"></span></p>';
                    } else {
                        htmlContent += '<span class="cursor"></span>';
                    }
                    
                    aiBubble.innerHTML = htmlContent;
                    charIndex++;
                    
                    // Auto-scroll subtil pendant l'écriture
                    if (chatContainer.scrollHeight - chatContainer.scrollTop - chatContainer.clientHeight < 150) {
                        scrollToBottom();
                    }
                    
                    setTimeout(typeWriter, typingSpeed);
                } else {
                    // Effet terminé, on affiche le markdown propre sans curseur
                    aiBubble.innerHTML = marked.parse(aiResponseText);
                }
            }
            
            typeWriter();
        });
    </script>
</body>
</html>
