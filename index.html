<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon IA Textuelle</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg-color: #050505;
            --text-main: #f5f5f7;
            --text-muted: #a1a1a6;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-highlight: rgba(255, 255, 255, 0.15);
            --accent: #0071e3;
            --accent-glow: rgba(0, 113, 227, 0.5);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); height: 100vh; display: flex; flex-direction: column; }
        .app-container { max-width: 800px; margin: 0 auto; width: 100%; height: 100%; display: flex; flex-direction: column; padding: 20px; }
        .chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .message-wrapper { display: flex; gap: 10px; }
        .message-bubble { padding: 15px; border-radius: 15px; background: var(--glass-bg); border: 1px solid var(--glass-border); max-width: 80%; }
        .user .message-bubble { background: var(--accent); }
        .input-area { padding: 20px; display: flex; gap: 10px; background: var(--glass-bg); border-radius: 20px; }
        textarea { flex: 1; background: transparent; border: none; color: white; resize: none; outline: none; }
        button { background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer; }
        .cursor { display: inline-block; width: 6px; height: 1em; background-color: white; margin-left: 2px; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>
    <div class="app-container">
        <div id="chat-container" class="chat-container"></div>
        <form id="chat-form" class="input-area">
            <textarea id="user-input" required placeholder="Posez votre question..."></textarea>
            <button type="submit">Envoyer</button>
        </form>
    </div>

    <script>
        const apiKey = "AQ.Ab8RN6ILHJ6Lo1Fe50rk8fMeizhdyEDfRYJ532viBgEhvr2DwA";
        const form = document.getElementById('chat-form');
        const chatContainer = document.getElementById('chat-container');

        form.onsubmit = async (e) => {
            e.preventDefault();
            const input = document.getElementById('user-input');
            const text = input.value;
            input.value = '';

            // Message utilisateur
            const uDiv = document.createElement('div');
            uDiv.className = 'message-wrapper user';
            uDiv.innerHTML = `<div class="message-bubble">${text}</div>`;
            chatContainer.appendChild(uDiv);

            // Message IA
            const aiDiv = document.createElement('div');
            aiDiv.className = 'message-wrapper';
            aiDiv.innerHTML = `<div class="message-bubble"></div>`;
            chatContainer.appendChild(aiDiv);
            const bubble = aiDiv.querySelector('.message-bubble');

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text }] }] })
                });
                const data = await response.json();
                const aiText = data.candidates[0].content.parts[0].text;
                
                // Animation
                let i = 0;
                const interval = setInterval(() => {
                    bubble.innerHTML = marked.parse(aiText.substring(0, i)) + '<span class="cursor"></span>';
                    i++;
                    if (i > aiText.length) {
                        clearInterval(interval);
                        bubble.innerHTML = marked.parse(aiText);
                    }
                }, 20);
            } catch (err) {
                bubble.textContent = "Erreur : impossible de contacter l'IA.";
            }
        };
    </script>
</body>
</html>
